name: Herve CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      lib: ${{ steps.filter.outputs.lib }}
      lib: ${{ steps.filter.outputs.include }}
      herve: ${{ steps.filter.outputs.herve }}
      examples: ${{ steps.filter.outputs.examples }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            lib:
              - 'lib/**'
            include:
              - 'include/**'
            herve:
              - 'include/**'
              - 'lib/**'
              - 'src/**'
              - 'builtin_services/**'
            examples:
              - 'include/**'
              - 'lib/**'

  include-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.include == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nasm
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Run route tests
        run: make -C tests/include/server program=route_test

  lib-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.lib == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nasm
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Run bcrypt tests
        run: make -C tests/lib/crypto/bcrypt

      - name: Run malloc tests
        run: make -C tests/lib/malloc

      - name: Run JSON encoding tests
        run: make -C tests/lib/encoding/json

      - name: Run models tests
        run: make -C tests/lib/models

      - name: Run HTML encoding tests
        run: make -C tests/lib/encoding/html

      - name: Run boeuf tests
        run: make -C tests/lib/boeuf

      - name: Run Base64 encoding tests
        run: make -C tests/lib/encoding/base64

      - name: Run array tests
        run: make -C tests/lib/utils program=array_test

      - name: Run linked list tests
        run: make -C tests/lib/utils program=linked_list_test

      - name: Run string tests
        run: make -C tests/lib/utils program=string_test

      - name: Run hash table tests
        run: make -C tests/lib/hash_table

  herve-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.herve == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nasm
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Build and start herve
        run: |
          make
          cp .env.example .env
          ./bin/herve &
          echo $! > herve.pid
          sleep 2

      - name: Run tests
        run: ./scripts/test_services.sh

      - name: Stop herve
        if: always()
        run: kill $(cat herve.pid) 2>/dev/null || true

  wrk-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.examples == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y nasm wrk

      - name: Build and start herve
        run: |
          cp .env.example .env
          make run &
          echo $! > server.pid
          sleep 2

      - name: Run wrk benchmark
        run: wrk -c400 -d32s -t12 --latency http://localhost:5000/health

      - name: Stop herve
        if: always()
        run: kill $(cat server.pid) 2>/dev/null || true

  static-content-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.examples == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nasm
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Build and start static-content server
        working-directory: examples/static-content
        run: |
          make
          make run &
          echo $! > server.pid
          sleep 2

      - name: Run tests
        run: ./scripts/test_static_content.sh

      - name: Stop server
        if: always()
        run: kill $(cat examples/static-content/server.pid) 2>/dev/null || true

  echo-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.examples == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nasm
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Build and start echo server
        working-directory: examples/echo
        run: |
          make
          make run &
          echo $! > server.pid
          sleep 2

      - name: Run tests
        run: ./scripts/test_echo.sh

      - name: Stop server
        if: always()
        run: kill $(cat examples/echo/server.pid) 2>/dev/null || true

  models-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.examples == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nasm
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Build and start models server
        working-directory: examples/models
        run: |
          make
          make run &
          echo $! > server.pid
          sleep 2

      - name: Run tests
        run: ./scripts/test_models.sh

      - name: Stop server
        if: always()
        run: kill $(cat examples/models/server.pid) 2>/dev/null || true
